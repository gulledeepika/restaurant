<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inventory Management</title>

<!-- Login Protection -->
<script>
if (!localStorage.getItem("loggedIn")) {
    window.location.href = "login.html";
}
</script>

<head>
<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="d-flex">

<!-- Sidebar -->
<div class="sidebar">
    <h3>HelloBooks</h3>

    <a href="index.html">Dashboard</a>
    <a href="invoice.html">Billing</a>
    <a href="inventory.html">Inventory</a>
    <a href="reports.html">Reports</a>

    <div style="position:absolute; bottom:20px; width:180px;">
        <button class="btn btn-danger w-100" onclick="logout()">Logout</button>
    </div>
</div>

<!-- Main Content -->
<div class="main">

    <h2 class="mb-4 fw-bold">Inventory Management</h2>

    <!-- TABLE -->
    <table class="table table-bordered mt-4" id="inventoryTable">

        <thead class="table-dark">
            <tr>
                <th>Item</th>
                <th>Quantity</th>
                <th>Supplier</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>

            <tr>
                <td><input type="text" class="form-control" value="Tomatoes"></td>
                <td><input type="number" class="form-control" value="5"></td>
                <td><input type="text" class="form-control" value="ABC Farms"></td>

                <td>
                    <select class="form-select">
                        <option>Available</option>
                        <option>Low Stock</option>
                    </select>
                </td>

                <td>
                    <button class="btn btn-success btn-sm">Save</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteRow(this)">Delete</button>
                </td>
            </tr>

        </tbody>

    </table>

    <!-- Add Button -->
    <button class="btn btn-success" onclick="addRow()">+ Add Item</button>

    <!-- Center Save -->
    <div class="save-center">
        <button class="btn btn-success">Save Changes</button>
    </div>

</div>

</div>

<!-- JavaScript -->
<script>

function addRow() {

    let table = document.getElementById("inventoryTable").getElementsByTagName('tbody')[0];

    let row = table.insertRow();

    row.innerHTML = `
        <td><input type="text" class="form-control" placeholder="Item"></td>
        <td><input type="number" class="form-control" placeholder="Qty"></td>
        <td><input type="text" class="form-control" placeholder="Supplier"></td>

        <td>
            <select class="form-select">
                <option>Available</option>
                <option>Low Stock</option>
            </select>
        </td>

        <td>
            <button class="btn btn-success btn-sm">Save</button>
            <button class="btn btn-danger btn-sm" onclick="deleteRow(this)">Delete</button>
        </td>
    `;
}

function deleteRow(btn) {
    btn.closest("tr").remove();
}

function logout(){
    localStorage.removeItem("loggedIn");
    window.location.href = "login.html";
}

</script>

</body>
</html>
</html>
